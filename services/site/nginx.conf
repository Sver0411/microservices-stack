server {
    listen 80;
    server_name _;
    server_tokens off;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    server_tokens off;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # gzip
    gzip on;
    gzip_types text/html text/css application/javascript text/plain application/json application/xml;
    gzip_min_length 256;

    # Static asset caching
    location /fonts/   { expires 30d; add_header Cache-Control "public, immutable"; }
    location /styles.css { expires 7d; add_header Cache-Control "public"; }
    location /icons/   { expires 30d; add_header Cache-Control "public, immutable"; }
    location /manifest.json { expires 7d; add_header Cache-Control "public"; }
    location /service-worker.js { expires 1d; add_header Cache-Control "public"; }

    # ── Dashboard ──
    location /dashboard/ {
        proxy_pass http://personal-dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Blog API ──
    location /blog/api/ {
        rewrite ^/blog/api/(.*) /$1 break;
        proxy_pass http://blog-backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Laptop Booking ──
    location /laptop/api/ {
        rewrite ^/laptop/api/(.*) /api/$1 break;
        proxy_pass http://laptop-booking:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /laptop/admin {
        proxy_pass http://laptop-booking:5000/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── File Converter ──
    location /api/convert {
        proxy_pass http://file-converter;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;
    }

    # ── Dashboard API (public read-only) ──
    location /api/ {
        proxy_pass http://personal-dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Library API ──
    location /library/api/ {
        set $lib_api library-api:8000;
        rewrite ^/library/api/(.*) /api/$1 break;
        proxy_pass http://$lib_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10m;
    }

    # ── Default ──
    location / {
        try_files $uri $uri/ =404;
    }
}
